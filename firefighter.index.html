<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台南市政府消防局 - 即時災情與救護通報網</title>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        
        /* 前台首頁大標題 */
        header { background-color: #b71c1c; color: white; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .header-backend { background-color: #37474f; position: relative; }
        
        .container { max-width: 1100px; margin: 25px auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 0 12px rgba(0,0,0,0.1); display: none; }
        .container.active { display: block; }

        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 15px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #333; color: white; }
        
        /* 災害等級與狀態標籤 */
        .tag { padding: 4px 8px; border-radius: 4px; color: white; font-weight: bold; font-size: 13px; display: inline-block;}
        .level-1 { background-color: #ff9800; } 
        .level-2 { background-color: #f44336; } 
        .level-3 { background-color: #b71c1c; } 
        .tag-closed { background-color: #757575; } 
        
        .status-dispatch { color: #d32f2f; font-weight: bold; }
        .status-rescue { color: #f57c00; font-weight: bold; }
        .status-resolved { color: #388e3c; font-weight: bold; }

        /* 擬真官方頁尾樣式 */
        footer { background-color: #2c3e50; color: #bdc3c7; padding: 20px; text-align: center; font-size: 13px; line-height: 1.8; margin-top: 60px; border-top: 4px solid #b71c1c; }
        .footer-links { margin-top: 10px; color: #7f8c8d; }
        /* 隱藏的後台入口，外觀看起來就像普通的宣告字體 */
        .secret-entrance { color: #7f8c8d; text-decoration: none; cursor: pointer; margin-left: 15px; font-size: 12px; transition: 0.2s; }
        .secret-entrance:hover { color: #ffffff; }

        /* 表單與後台按鈕 */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group.full-width { grid-column: 1 / -1; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input[type="text"], input[type="password"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: 'Microsoft JhengHei'; }
        
        .btn-submit { background-color: #d32f2f; color: white; border: none; padding: 12px 20px; font-size: 16px; cursor: pointer; border-radius: 4px; width: 100%; font-weight: bold; margin-top: 10px; }
        .btn-submit:hover { background-color: #9a0007; }
        
        .btn-update { background-color: #1976d2; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 3px; }
        .btn-close { background-color: #388e3c; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 3px; }
        .btn-delete { background-color: #d32f2f; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 3px; }
        
        /* 後台右上角功能鈕 */
        .header-btn-group { position: absolute; right: 20px; top: 18px; }
        .btn-header { background-color: #546e7a; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-left: 10px; }
        .btn-header:hover { background-color: #37474f; }
        .btn-logout-style { background-color: #e53935; }
        .btn-logout-style:hover { background-color: #b71c1c; }

        .section-title { border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 40px; color: #37474f; }

        /* 登入視窗 */
        .login-box { max-width: 400px; margin: 80px auto; text-align: center; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        .login-box h3 { color: #37474f; margin-bottom: 20px; border-bottom: 2px solid #37474f; padding-bottom: 10px; }
        .error-msg { color: red; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div id="page-frontend" class="container active" style="max-width: 100%; margin: 0; padding: 0; border-radius: 0; box-shadow: none;">
    <header>
        <h2 style="margin: 0; letter-spacing: 2px;">台南市政府消防局 即時災情與救護通報系統</h2>
    </header>
    
    <div style="max-width: 1100px; margin: 25px auto; padding: 0 20px;">
        <h3 style="color: #2c3e50; border-left: 5px solid #b71c1c; padding-left: 10px;">轄區即時災情看板 (每分鐘自動更新)</h3>
        <table>
            <thead>
                <tr>
                    <th style="width: 15%;">案件編號</th>
                    <th style="width: 10%;">時間</th>
                    <th style="width: 10%;">等級</th>
                    <th style="width: 12%;">災害類型</th>
                    <th>發生地點</th>
                    <th style="width: 20%;">派遣單位</th>
                    <th style="width: 13%;">案件狀態</th>
                </tr>
            </thead>
            <tbody id="frontend-list"></tbody>
        </table>
    </div>

    <footer>
        <div>台南市政府消防局 版權所有 © 2026 勤務指揮中心維護</div>
        <div>地址：台南市灣裡路消防行政大樓2樓 | 緊急報案電話：119 |</div>
        <div class="footer-links">
            <span>隱私權保護政策</span> | <span>政府網站資料開放宣告</span> | 
            <span class="secret-entrance" onclick="navigateTo('login')">內部資訊系統</span>
        </div>
    </footer>
</div>

<div id="page-login" class="container">
    <div class="login-box">
        <h3>勤務系統安全驗證</h3>
        <form id="login-form">
            <div class="form-group" style="text-align: left;">
                <label>派遣員帳號</label>
                <input type="text" id="username" placeholder="請輸入公務帳號" required>
            </div>
            <div class="form-group" style="text-align: left;">
                <label>管制通訊密碼</label>
                <input type="password" id="password" placeholder="請輸入密碼" required>
            </div>
            <button type="submit" class="btn-submit" style="background-color: #37474f;">認證並登入</button>
            <button type="button" class="btn-submit" style="background-color: #9e9e9e; margin-top: 5px;" onclick="navigateTo('frontend')">返回大廳</button>
            <div id="login-error" class="error-msg">驗證失敗：帳號或密碼錯誤。</div>
        </form>
    </div>
</div>

<div id="page-backend" class="container">
    <header class="header-backend">
        <h2 style="margin: 0;">勤務指揮中心 - 災害調度與管制系統</h2>
        <div class="header-btn-group">
            <button class="btn-header" onclick="navigateTo('frontend')">查看前台看板</button>
            <button class="btn-header btn-logout-style" onclick="logout()">安全登出</button>
        </div>
    </header>
    
    <h3 class="section-title" style="margin-top: 10px;">新進報案與災情通報</h3>
    <form id="incident-form">
        <div class="form-grid">
            <div class="form-group">
                <label>災害類型</label>
                <select id="type">
                    <option value="火警">火警 (Fire)</option>
                    <option value="緊急救護">緊急救護 (Medical)</option>
                    <option value="為民服務">為民服務 (Public Service)</option>
                    <option value="特種災害">特種災害 (Special Hazard)</option>
                </select>
            </div>
            <div class="form-group">
                <label>災害等級</label>
                <select id="level">
                    <option value="一級">一級 (一般火警/救護)</option>
                    <option value="二級">二級 (中度火災/需多單位增援)</option>
                    <option value="三級">三級 (重大災害/啟動處置機制)</option>
                </select>
            </div>
            <div class="form-group full-width">
                <label>發生地點 (詳細地址或鄰近地標)</label>
                <input type="text" id="location" placeholder="例如：南屯區文心路與向上路交叉口" required>
            </div>
            <div class="form-group">
                <label>初期派遣實力</label>
                <input type="text" id="units" placeholder="例如：中正分隊（水箱11、救護51）" required>
            </div>
            <div class="form-group">
                <label>調度初始狀態</label>
                <select id="status">
                    <option value="車輛派遣中" selected>車輛派遣中</option>
                    <option value="到達現場搶救中">到達現場搶救中</option>
                </select>
            </div>
        </div>
        <button type="submit" class="btn-submit">確認發布通報</button>
    </form>

    <h3 class="section-title">線上勤務即時追蹤 (未結案)</h3>
    <table>
        <thead>
            <tr>
                <th>編號</th>
                <th>的地點</th>
                <th>當前狀態</th>
                <th>動態變更</th>
                <th>指揮操作</th>
            </tr>
        </thead>
        <tbody id="backend-active-list"></tbody>
    </table>

    <h3 class="section-title">歷史勤務紀錄存檔 (已結案)</h3>
    <table>
        <thead>
            <tr>
                <th>編號</th>
                <th>類型</th>
                <th>地點</th>
                <th>最終狀態</th>
                <th>權限操作</th>
            </tr>
        </thead>
        <tbody id="backend-history-list"></tbody>
    </table>
</div>

<script>
    let incidents = JSON.parse(localStorage.getItem('fireDeptIncidents')) || [];
    
    // 後台認證資料配置
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'fire2026';

    // 頁面切換控制中心
    function navigateTo(targetPage) {
        // 隱藏所有頁面區塊
        document.getElementById('page-frontend').style.display = 'none';
        document.getElementById('page-login').style.display = 'none';
        document.getElementById('page-backend').style.display = 'none';

        if (targetPage === 'backend') {
            // 檢查 Session 狀態
            if (sessionStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('page-backend').style.display = 'block';
            } else {
                document.getElementById('page-login').style.display = 'block';
            }
        } else if (targetPage === 'login') {
            if (sessionStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('page-backend').style.display = 'block';
            } else {
                document.getElementById('page-login').style.display = 'block';
            }
        } else {
            document.getElementById('page-frontend').style.display = 'block';
        }
        renderTables();
    }

    // 登入驗證
    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const errorMsg = document.getElementById('login-error');

        if (user === ADMIN_USER && pass === ADMIN_PASS) {
            sessionStorage.setItem('isLoggedIn', 'true');
            errorMsg.style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            navigateTo('backend');
        } else {
            errorMsg.style.display = 'block';
        }
    });

    // 登出
    function logout() {
        sessionStorage.removeItem('isLoggedIn');
        alert('勤務系統已安全登出並鎖定。');
        navigateTo('frontend');
    }

    /* 核心勤務資料處理 */
    const getCurrentTime = () => new Date().toLocaleTimeString('zh-TW', {hour: '2-digit', minute:'2-digit', hour12: false});
    const generateID = () => {
        const d = new Date();
        const dateStr = d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
        return `INC-${dateStr}-${Math.floor(Math.random() * 900) + 100}`;
    }

    document.getElementById('incident-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const newIncident = {
            id: generateID(), time: getCurrentTime(),
            type: document.getElementById('type').value, level: document.getElementById('level').value,
            location: document.getElementById('location').value, units: document.getElementById('units').value,
            status: document.getElementById('status').value, isClosed: false
        };
        incidents.unshift(newIncident); 
        saveData(); renderTables();
        document.getElementById('location').value = ''; document.getElementById('units').value = '';
        alert('指揮中心提示：即時災情已發布通報！'); navigateTo('frontend');
    });

    function updateStatus(id) {
        const newStatus = document.getElementById(`status-update-${id}`).value;
        const index = incidents.findIndex(inc => inc.id === id);
        if(index !== -1) { incidents[index].status = newStatus; saveData(); renderTables(); alert(`案件 ${id} 狀態已更新為：${newStatus}`); }
    }

    function closeIncident(id) {
        if(confirm('確定執行結案歸檔？此案件將從公眾前台撤除。')) {
            const index = incidents.findIndex(inc => inc.id === id);
            if(index !== -1) { incidents[index].status = '任務結束/已結案'; incidents[index].isClosed = true; saveData(); renderTables(); }
        }
    }

    function deleteIncident(id) {
        if(confirm('確定作廢此公務紀錄？這將會永久抹除此筆資料。')) {
            incidents = incidents.filter(inc => inc.id !== id); saveData(); renderTables();
        }
    }

    function saveData() { localStorage.setItem('fireDeptIncidents', JSON.stringify(incidents)); }

    function renderTables() {
        const frontendList = document.getElementById('frontend-list');
        const backendActiveList = document.getElementById('backend-active-list');
        const backendHistoryList = document.getElementById('backend-history-list');
        
        if(!frontendList || !backendActiveList || !backendHistoryList) return;

        frontendList.innerHTML = ''; backendActiveList.innerHTML = ''; backendHistoryList.innerHTML = '';
        let activeCount = 0; let historyCount = 0;

        incidents.forEach(inc => {
            let statusClass = inc.status.includes('搶救') ? 'status-rescue' : inc.status.includes('控制') || inc.status.includes('結束') ? 'status-resolved' : 'status-dispatch';
            let levelClass = inc.level === '一級' ? 'level-1' : inc.level === '二級' ? 'level-2' : 'level-3';

            if (!inc.isClosed) {
                frontendList.innerHTML += `<tr><td><b>${inc.id}</b></td><td>${inc.time}</td><td><span class="tag ${levelClass}">${inc.level}</span></td><td>${inc.type}</td><td>${inc.location}</td><td>${inc.units}</td><td class="${statusClass}">${inc.status}</td></tr>`;
                backendActiveList.innerHTML += `<tr><td>${inc.id}</td><td>${inc.location}</td><td class="${statusClass}">${inc.status}</td><td><select id="status-update-${inc.id}"><option value="車輛派遣中" ${inc.status==='車輛派遣中'?'selected':''}>車輛派遣中</option><option value="到達現場搶救中" ${inc.status==='到達現場搶救中'?'selected':''}>到達現場搶救中</option><option value="火勢控制/處理中" ${inc.status==='火勢控制/處理中'?'selected':''}>火勢控制/處理中</option></select></td><td><button class="btn-update" onclick="updateStatus('${inc.id}')">更新</button> <button class="btn-close" onclick="closeIncident('${inc.id}')">結案歸檔</button></td></tr>`;
                activeCount++;
            } else {
                backendHistoryList.innerHTML += `<tr><td>${inc.id}</td><td><span class="tag tag-closed">${inc.type}</span></td><td>${inc.location}</td><td class="status-resolved">${inc.status}</td><td><button class="btn-delete" onclick="deleteIncident('${inc.id}')">作廢</button></td></tr>`;
                historyCount++;
            }
        });

        if(activeCount === 0) { frontendList.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#666; padding: 35px;">目前全市轄區內無處理中災害案件</td></tr>'; backendActiveList.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#666; padding: 20px;">目前無線上調度勤務</td></tr>'; }
        if(historyCount === 0) { backendHistoryList.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#666; padding: 20px;">目前無歷史結案歸檔紀錄</td></tr>'; }
    }

    // 初始化載入
    navigateTo('frontend');
</script>

</body>
</html>
